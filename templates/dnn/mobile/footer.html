<!-- 🔥 Subscribe Modal -->
{% include 'subscribe_model.html' %}

<style>
.fs-10 { font-size: 10px; }
.fs-11 { font-size: 11px; }
.fs-12 { font-size: 12px; }
.fs-14 { font-size: 14px; }
.fs-16 { font-size: 16px; }
  /* Swiper Fullscreen */
.reelsSwiper,
.swiper-wrapper,
.swiper-slide {
  height: 100vh !important;
}

.reel-item {
  position: relative;
  width: 100%;
  height: 100vh;
  background: black;
}

/* Video */
.reel-item iframe {
  width: 100%;
  height: 100vh;
  pointer-events: none; /* 🔥 swipe ke liye */
}

/* Title */
.reel-title {
  position: absolute;
  bottom: 20px;
  left: 10px;
  right: 10px;
  color: #fff;
  font-size: 14px;
}
</style>
<!-- 🔥 JS (Cleaned + Optimized) -->


<script>
const subscribeModal = document.getElementById('subscribeModal');
const notificationIcon = document.getElementById('notificationIcon');
const closeModal = document.getElementById('closeModal');

if(notificationIcon && subscribeModal){
  notificationIcon.onclick = () => subscribeModal.style.display = 'flex';
}

if(closeModal && subscribeModal){
  closeModal.onclick = () => subscribeModal.style.display = 'none';
}

window.onclick = function (event) {
  if (event.target === subscribeModal) {
    subscribeModal.style.display = 'none';
  }
}
</script>
