<!-- Swiper CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<section class="container px-2 my-3">

  <!-- Header -->
  <div class="custom-article-header">
      <h6 class="custom-article-title">Latest Reels</h6>
      <a href="/all-reels-news/all" class="text-xs">View All</a>
    </div>

  <!-- Slider -->
  <div class="swiper reelsSwiper">
    <div class="swiper-wrapper">

      {% for reels in Reels %}
      <div class="swiper-slide">
        <div class="reel-card">

          <a href="/video/{{reels.slug}}">
            <div class="reel-img">

              <!-- Thumbnail -->
              <img src="https://img.youtube.com/vi/{{reels.video_url}}/hqdefault.jpg" 
                   alt="{{reels.video_title}}">

              <!-- Badge -->
              <span class="reel-badge">REEL</span>

              <!-- Play Button -->
              <div class="reel-play">
                ▶
              </div>

            </div>

            <!-- Content -->
            <div class="reel-content">
              <h6 class="reel-title">
                {{ reels.video_title|truncatechars:30 }}
              </h6>
              <p class="reel-date">
                {{ reels.schedule_date|date:"M d, Y" }}
              </p>
            </div>
          </a>

        </div>
      </div>
      {% endfor %}

    </div>
  </div>

</section>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const reelsSwiper = new Swiper('.reelsSwiper', {
  slidesPerView: 2.2,
  spaceBetween: 10,
  loop: false,

  breakpoints: {
    576: { slidesPerView: 2.2 },
    768: { slidesPerView: 4 },
    992: { slidesPerView: 5 }
  }
});
</script>

<!-- CSS -->
<style>
  .reelsSwiper {
    height: auto !important;
  }
.reel-card {
  border-radius: 14px;
  overflow: hidden;
}

/* Image */
.reel-img {
  position: relative;
  height: 110px;
}

.reel-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px 12px 0 0;
}

/* Badge */
.reel-badge {
  position: absolute;
  top: 6px;
  left: 6px;
  background: red;
  color: #fff;
  font-size: 10px;
  padding: 3px 6px;
  border-radius: 6px;
  font-weight: 600;
}

/* Play */
.reel-play {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.9);
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Content */
.reel-content {
  padding: 7px;
  background: #fff;
}

.reel-title {
    font-size: 12px !important;
    font-weight: 600;
    line-height: 1.3;
    bottom: 0px !important;
    overflow: hidden;
    color: black !important;
    position: relative !important;
    text-align: left !important;
    left: 0 !important;
    right: 0 !important;
}

.reel-date {
  font-size: 11px;
  color: #888;
  text-align: left;
}

/* Optional smooth spacing */
.swiper-slide {
  width: auto;
  height: auto !important;
}
</style>
