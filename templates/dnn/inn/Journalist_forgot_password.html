{% include "head.html" %}
{% load static %}
{% block body %}
<div class="video-background">
    <video autoplay muted loop playsinline>
        <source src="{% static 'assets/dnn2/artdomain_sing-up.mp4' %}" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>
</div>
<div class="container-fluid dxb-bg py-5">
    <div class="m-3">
        <div class="row">
           <div class="col-lg-8 col-md-12 col-sm-12 "></div>
           <div class="col-lg-4 col-md-12 col-sm-12">
            <div class="form-wrapper">
                <div class="login-container" id="login-container">
                    <div class="col-md-12 sighnup-logo">
                        <a href="/">
                        <img src="../../../static/assets/dnn/img/logo_sighnup.png" alt="DXB NEWS">
                        </a>
                        <h2 class="text-center sgignup-head">Forgot Password</h2>
                    </div>
                    
                    <div class="px-3">
                        <form id="forgot-password-form" method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <!-- <label for="email" class="form-label fw-semibold">Enter your registered email</label> -->
                                <input type="email" id="email" name="email" class="form-control shadow-sm" placeholder="Enter your registered email" required>
                            </div>
                            <!-- Display success and error messages here -->
                            <div id="success-message" class="alert alert-success" style="display: none;"></div>
                            <div id="error-message" class="alert alert-danger" style="display: none;"></div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-login">Send Reset Link</button>
                            </div>
                        </form>
                        <div id="response-message" class="text-center mt-3"></div>
                        <div class="text-center mt-3">
                            <a href="{% url 'sign-in' %}" class="forgot-password">Back to Login</a>
                        </div>
                    </div>
                </div>
            </div>
                <!-- form End -->
            </div>
        </div>
    </div>
</div>



<script>
    document.getElementById('forgot-password-form').addEventListener('submit', function(event) {
        event.preventDefault();  // Prevent default form submission

        let formData = new FormData(this);  // Get form data

        fetch("{% url 'forgot-password' %}", {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': document.getElementsByName('csrfmiddlewaretoken')[0].value
            }
        })
        .then(response => response.json())
        .then(data => {
            const successMessageElement = document.getElementById('success-message');
            const errorMessageElement = document.getElementById('error-message');
            
            // Clear any previous messages
            successMessageElement.style.display = 'none';
            errorMessageElement.style.display = 'none';

            // Check response status and display appropriate message
            if (data.status === 'error') {
                // Display error message
                errorMessageElement.innerHTML = `<p>${data.message}</p>`;
                errorMessageElement.style.display = 'block';
            } else if (data.status === 'success') {
                // Display success message
                successMessageElement.innerHTML = `<p>${data.message}</p>`;
                successMessageElement.style.display = 'block';
            }
        })
        .catch(error => {
            console.error('Error:', error);
        });
    });
</script>

 <style>
  @media (max-width: 576px) {

  /* ❌ Remove video */
  .video-background {
    display: none !important;
  }

  /* 🔵 Blue top header */
  .dxb-bg {
    background: linear-gradient(180deg, #0d47a1, #0a3d91) !important;
    padding-top: 140px !important;
    min-height: 100vh;
  }

  /* 📦 Bottom white card */
  .login-container {
    width: 100% !important;
    background: #fff !important;
    border-radius: 15px !important;
    padding: 20px !important;
    margin: 0 !important;
    box-shadow: 0 -5px 25px rgba(0,0,0,0.2);
  }

  /* 📍 Align bottom */
  .form-wrapper {
    align-items: flex-end !important;
    justify-content: center !important;
    padding: 0 !important;
  }

 .sighnup-logo img {
    margin-bottom: 20px;
  }

  /* 🔤 Heading */
  .sgignup-head {
    position: absolute;
    top: -100px;
    left: 20px;
    color: #fff !important;
    font-size: 26px;
    font-weight: 700;
    text-align: left;
  }

  /* Sub text */
  .sgignup-head::after {
    content: "Enter your email to reset password";
    display: block;
    font-size: 14px;
    font-weight: 400;
    margin-top: 5px;
    color: rgba(255,255,255,0.8);
  }



  /* 📥 Input */
  .form-control {
    border-radius: 14px !important;
    height: 50px;
    font-size: 14px;
    border: 1px solid #ddd;
    padding-left: 15px;
  }

  /* 🔘 Button */
  .btn-login {
    background: linear-gradient(90deg, #1565c0, #1976d2) !important;
    border-radius: 14px !important;
    padding: 14px;
    font-weight: 600;
    font-size: 15px;
  }

  /* 🔗 Back to login */
  .forgot-password {
    font-size: 13px;
  }

  /* 📩 Alert spacing */
  #success-message,
  #error-message {
    font-size: 13px;
    border-radius: 10px;
  }

}
</style>
{% endblock %}
