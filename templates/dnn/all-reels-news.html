{% extends 'base.html' %}
{% block body %}
{% load static %}

<div class="container mtopspace mt-4">
  <div class="row">

    <!-- LEFT SECTION -->
    <div class="col-lg-12 col-md-12 col-sm-12">

      <!-- Heading -->
      <div class="d-flex justify-content-between align-items-center my-2">
        <h6 class="fw-bold text-uppercase">Watch Special Reels</h6>
      </div>

      <!-- GRID START -->
      <div class="row">

        {% for vidpost in BlogData %}
        <div class="col-lg-3 col-md-4 col-12 mb-3">

          <div class="reel-card">
            <a href="/video/{{vidpost.slug}}" class="text-dark text-decoration-none">
              <!-- Content -->
              <div class="reel-content">
                <h6 class="m-0 ">
                  {{ vidpost.video_title|truncatechars:50 }}
                </h6>

                <span class="reel-date">
                  DXB News • {{ vidpost.schedule_date|date:"M d, Y" }}
                </span>
              </div>
              <!-- Image -->
              <div class="reel-img">
                <img src="https://img.youtube.com/vi/{{vidpost.video_url}}/hqdefault.jpg"
                     alt="{{vidpost.video_title}}">

                

                <div class="reel-play">
                  <i class="bi bi-play-fill"></i>
                </div>
              </div>
            </a>
          </div>

        </div>
        {% endfor %}

      </div>
      <!-- GRID END -->

    </div>

    <!-- RIGHT SECTION -->
    <!-- <div class="col-lg-3 col-md-4 col-sm-12">
      {% include "rightcollam.html" %}
    </div> -->

  </div>
</div>

<style>
  .reel-card {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.reel-img {
  position: relative;
}

.reel-img img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* Badge */
.reel-badge {
  position: absolute;
  top: 8px;
  left: 8px;
  background: red;
  color: #fff;
  font-size: 10px;
  padding: 3px 7px;
  border-radius: 5px;
}

/* Play button */
.reel-play {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: red;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}

.reel-content {
  padding: 10px;
}

.reel-title {
  font-size: 14px;
  font-weight: 600;
}

.reel-date {
  font-size: 12px;
  color: #888;
}
</style>
{% endblock %}
